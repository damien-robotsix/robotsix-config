# Per-repo periodic workflow: presence enables triage_boilerplate for this repo.
# Scans recent triage tickets for recurring patterns and proposes boilerplate
# response templates.  Repo-agnostic — this file partial-merges over the built-in
# triage_boilerplate definition (lives in robotsix-mill:
# agent_definitions/periodic/triage_boilerplate.yaml).
#
# Known patterns (do not re-file):
# - docker-503-infrastructure: Sandbox Docker 503 errors affecting every command.
name: triage_boilerplate
prompt_overlay: |
  ## Known Pattern: Docker 503 Infrastructure Outage (docker-503-infrastructure)

  **Gap ID:** `docker-503-infrastructure`

  **Trigger:**
  - The sandbox suite fails.
  - The failure output shows Docker 503 errors (`503 Service Unavailable`) affecting
    ALL commands — not just the project's test suite.
  - GitHub CI on the same commit is green (or also shows infrastructure failures in
    reusable workflows).

  **Key diagnostic phrase:**
  > The failing output is not from any specific test — **every command** (even `echo`)
  > returns the same Docker 503 error.

  This is the tell-tale sign that distinguishes an infrastructure outage from a
  genuine test failure. The sandbox/CI runner itself is backed by a Docker daemon
  that is currently unavailable (`503 Service Unavailable` — no server available to
  handle the request). This is an infrastructure error, not a code bug.

  **Boilerplate response for triagers:**
  ```
  sandbox suite failed but GitHub CI on <commit-short> is green — proceeding;
  failing tests likely network-dependent: The failing output is not from any
  specific test — every command (even `echo`) returns the same Docker 503 error.
  The sandbox/CI runner itself is backed by a Docker daemon that is currently
  unavailable (`503 Service Unavailable` — no server available to handle the
  request). This is an infrastructure error, not a code bug.
  ```

  **Do NOT re-file this pattern.** It is a known infrastructure gap with a
  documented boilerplate response.
