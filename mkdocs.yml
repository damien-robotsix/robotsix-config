site_name: robotsix-config
site_url: https://damien-robotsix.github.io/robotsix-config
repo_url: https://github.com/damien-robotsix/robotsix-config

watch:
  - src/robotsix_config

nav:
  - Home: robotsix_config/index.md
  - API Reference:
      - Overview: robotsix_config/api.md
      - Config: config/index.md
      - Errors: _errors/index.md
  - Contributing: robotsix_config/contributing.md
  - Security: robotsix_config/security.md

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_symbol_type_heading: true
            merge_init_into_class: true
            docstring_section_style: table
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed
  - toc:
      permalink: true
