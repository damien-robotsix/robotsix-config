repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0  # pragma: allowlist secret
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: debug-statements
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 3b3f7c3f57fe9925356faf5fe6230835138be230  # frozen: v0.15.17  # pragma: allowlist secret
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: 4b2e70d08cb2ccd26d1fba73588de41c7a5d50b7  # frozen: v0.25  # pragma: allowlist secret
    hooks:
      - id: validate-pyproject
        additional_dependencies: ["validate-pyproject-schema-store[all]"]
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: 586c3ea3f51230da42bab657c6a32e9e66c364f0  # v0.44.0
    hooks:
      - id: markdownlint
  - repo: https://github.com/PyCQA/bandit
    rev: 92ae8b82fb422a639f0ed8d99e96cea769594e08  # frozen: 1.9.4  # pragma: allowlist secret
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        # bandit's pre-commit hook does not pull [tool.bandit] from
        # pyproject.toml unless pointed at it explicitly.
  - repo: https://github.com/Yelp/detect-secrets
    rev: 68e8b45440415753fff70a312ece8da92ba85b4a  # frozen: v1.5.0  # pragma: allowlist secret
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: ea2eb407b4cbce87cf0d502f36578950494f5ac9  # v1.23.1
    hooks:
      - id: zizmor
  - repo: https://github.com/rhysd/actionlint
    rev: 03d0035246f3e81f36aed592ffb4bebf33a03106  # v1.7.7
    hooks:
      - id: actionlint
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: a66e98df7b4aeeb3724184b332785976d062b92e  # v1.19.1
    hooks:
      - id: mypy
        args: []
        additional_dependencies:
          - types-PyYAML

  - repo: local
    hooks:
      - id: vulture
        name: vulture
        entry: vulture src/
        language: system
        pass_filenames: false

  - repo: local
    hooks:
      - id: robotsix-modules-validate
        name: robotsix-modules-validate
        entry: robotsix-modules-validate
        language: system
        files: ^docs/robotsix_config/modules\.yaml$
        pass_filenames: true
