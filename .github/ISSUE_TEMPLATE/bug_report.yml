name: Bug report
description: Report a bug
title: ''
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report! Please search
        [existing issues](https://github.com/damien-robotsix/robotsix-yaml-config/issues?q=is%3Aissue)
        to avoid duplicates. If this is a usage question, start a
        [GitHub Discussions](https://github.com/damien-robotsix/robotsix-yaml-config/discussions)
        thread instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction_steps
    attributes:
      label: Reproduction steps
      description: Steps to reproduce the behaviour.
      render: shell
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected_behaviour
    attributes:
      label: Expected behaviour
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual_behaviour
    attributes:
      label: Actual behaviour
      description: What actually happened. Include any error messages or tracebacks.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: python_version
    attributes:
      label: Python version
      options:
        - '3.14'
        - '3.13'
        - '3.12'
        - Other
    validations:
      required: true

  - type: dropdown
    id: operating_system
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: checkboxes
    id: affected_component
    attributes:
      label: Affected component
      description: Which part of the codebase is affected?
      options:
        - label: Config merge (deep_merge)
        - label: YAML loading (load_yaml_cascade / read_yaml_file)
        - label: Environment variable overlay (overlay_env_vars)
        - label: Config flattening (flatten_config)
        - label: Other / not sure

  - type: textarea
    id: suggested_fix
    attributes:
      label: Suggested fix (optional)
      description: If you have an idea for a fix, please share it.
    validations:
      required: false
