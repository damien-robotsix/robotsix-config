name: CI

on:
  push:
  pull_request:

concurrency:
  group: >-
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  ci:
    permissions:
      contents: read
      security-events: write
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-ci.yml@5cd8c1facb02299da618979e7a55f1953f9c075a
    with:
      python-version: "3.14"
      install-extras: "dev"
      cov-package: robotsix_config
      coverage-threshold: "90"
      run-deptry: true
      run-bandit: true
      mypy-advisory: false


  ruff:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

  vulture:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup

      - name: vulture
        run: uv run vulture src/

  docs-build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup

      - name: Build docs (strict mode)
        run: PYTHONPATH=src uv run mkdocs build --strict

  # The reusable spine runs bandit as a gate but does not emit a SARIF file or
  # upload it, so the code-scanning integration is preserved as a dedicated job
  # that regenerates the SARIF report and uploads it.
  bandit-sarif:
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup

      - name: bandit
        run: uvx --from 'bandit[sarif]' bandit -c pyproject.toml -r src/ -f sarif -o bandit-results.sarif

      - name: Upload bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  codeql-sast:
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4

  # The reusable spine runs pytest with coverage but only emits term-missing
  # output (no coverage.xml artifact), so the Codecov integration is preserved
  # as a dedicated job that regenerates the XML report and uploads it.
  coverage:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup

      - name: pytest
        run: uv run pytest -n auto --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/dependency-review-action@4901385134134e04cec5fbe5ddfe3b2c5bd5d976  # v4.0.0
        with:
          fail-on-severity: high

  dependency-audit:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup

      - name: Audit dependencies for known vulnerabilities
        run: uv audit --frozen
