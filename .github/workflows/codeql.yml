name: CodeQL

on:
  push:
  pull_request:
  schedule:
    - cron: "30 1 * * 0"

permissions:
  contents: read

jobs:
  codeql:
    permissions:
      contents: read
      security-events: write  # Required to upload SARIF results to the security tab
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/codeql.yml@7314c9b6c2b536ca81023e8841f272b72733262e  # main 2026-07-04
    with:
      languages: python
