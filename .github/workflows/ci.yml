name: CI

on:
  push:
  pull_request:

concurrency:
  group: >-
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  ci:
    permissions:
      contents: read
      security-events: write  # needed for SARIF upload
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-ci.yml@5cd8c1facb02299da618979e7a55f1953f9c075a
    with:
      python-version: "3.14"
      install-extras: "dev"
      cov-package: robotsix_config
      coverage-threshold: "90"
      run-deptry: true
      run-bandit: true
      mypy-advisory: false

  security:
    permissions:
      contents: read
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-security.yml@5fdc956e980cfb70ea36e33bc670a0376750dec6  # main 2026-07-03
    with:
      python-version: "3.14"
      install-extras: "dev"

  auto-release:
    permissions:
      contents: write  # needed for creating GitHub releases
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/auto-release.yml@5fdc956e980cfb70ea36e33bc670a0376750dec6  # main 2026-07-03
    with:
      python-version: "3.14"
    secrets: inherit  # needed for PyPI publishing token  # zizmor: ignore[secrets-inherit]

  baseline-check:
    permissions:
      contents: read
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/baseline-check.yml@5fdc956e980cfb70ea36e33bc670a0376750dec6  # main 2026-07-03
    with: {}

  ruff:
    name: Ruff lint & format
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

  changelog-check:
    name: Changelog fragment check
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
          fetch-depth: 0  # needed for towncrier check to compare against base branch

      - uses: ./.github/actions/setup

      - name: Check changelog fragment
        env:
          BASE_REF: ${{ github.base_ref }}
        run: uv run towncrier check --compare-with origin/$BASE_REF

  actionlint:
    name: Actionlint
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - name: Run actionlint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca  # v1.7.12

  vulture:
    name: Vulture dead code check
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: vulture
        run: uv run vulture src/

  check-modules:
    name: Check module registration
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Validate module taxonomy
        run: uv run robotsix-modules validate docs/robotsix_config/modules.yaml

      - name: Check module registration
        run: uv run robotsix-modules check-registration docs/robotsix_config/modules.yaml --root .

  check-schema:
    name: Check schema freshness
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Check schema freshness
        run: PYTHONPATH=src:. python scripts/check_schema_freshness.py --model tests.config.test_config.MailConfig --output tests/config/test_config.schema.json

  docs-build:
    name: Build docs
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Build docs (strict mode)
        run: PYTHONPATH=src uv run mkdocs build --strict

  # The reusable spine runs bandit as a gate but does not emit a SARIF file or
  # upload it, so the code-scanning integration is preserved as a dedicated job
  # that regenerates the SARIF report and uploads it.
  bandit-sarif:
    name: Bandit SARIF upload
    permissions:
      contents: read
      security-events: write  # needed for SARIF upload
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: bandit
        run: uvx --from 'bandit[sarif]' bandit -c pyproject.toml -r src/ -f sarif -o bandit-results.sarif

      - name: Upload bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  # The reusable spine runs pytest with coverage but only emits term-missing
  # output (no coverage.xml artifact), so the Codecov integration is preserved
  # as a dedicated job that regenerates the XML report and uploads it.
  coverage:
    name: Coverage & Codecov upload
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: pytest
        run: uv run pytest -n auto --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: moderate

  dependency-audit:
    name: Dependency audit
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Audit dependencies for known vulnerabilities
        run: uv audit --frozen
