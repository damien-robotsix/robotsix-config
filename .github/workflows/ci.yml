name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    permissions:
      contents: read
      security-events: write
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-ci.yml@a317d51ad25be89194d55f220164819807d549f1
    with:
      python-version: "3.14"
      install-extras: "dev"
      cov-package: robotsix_yaml_config
      coverage-threshold: "90"
      run-deptry: true
      run-bandit: true
      mypy-advisory: false


  vulture:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --extra dev

      - name: vulture
        run: uv run vulture src/ vulture_whitelist.py

  docs-build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Set up Python 3.13 (mkdocs does not support 3.14)
        run: uv python install 3.13

      - name: Create virtual environment
        run: uv venv --python 3.13

      - name: Install docs dependencies
        run: uv pip install --python 3.13 mkdocs-material 'mkdocstrings[python]'

      - name: Build docs (strict mode)
        run: .venv/bin/mkdocs build --strict

  # The reusable spine runs bandit as a gate but does not emit a SARIF file or
  # upload it, so the code-scanning integration is preserved as a dedicated job
  # that regenerates the SARIF report and uploads it.
  bandit-sarif:
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Set up Python
        run: uv python install 3.14

      - name: bandit
        run: uvx --from 'bandit[sarif]' bandit -c pyproject.toml -r src/ -f sarif -o bandit-results.sarif

      - name: Upload bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  # The reusable spine runs pytest with coverage but only emits term-missing
  # output (no coverage.xml artifact), so the Codecov integration is preserved
  # as a dedicated job that regenerates the XML report and uploads it.
  coverage:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --extra dev

      - name: pytest
        run: uv run pytest -n auto --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
