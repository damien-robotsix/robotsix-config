site_name: robotsix-yaml-config
site_url: https://damien-robotsix.github.io/robotsix-yaml-config
repo_url: https://github.com/damien-robotsix/robotsix-yaml-config

nav:
  - Home: index.md
  - Core: _core/index.md
  - Errors: _errors/index.md
  - Flatten: _flatten/index.md
  - API Reference:
      - Overview: api.md
      - Environment: _env/index.md
  - Contributing: contributing.md

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - search.suggest
    - search.highlight
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_symbol_type_heading: true
            merge_init_into_class: true
            docstring_section_style: table
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.tabbed
  - toc:
      permalink: true
