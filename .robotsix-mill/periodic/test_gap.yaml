# Per-repo periodic workflow: presence enables test_gap for this repo.
# Scans the repo for source modules with zero dedicated test coverage,
# prioritizes them by complexity / I-O surface, and files draft tickets
# to add the missing tests. Repo-agnostic — this file partial-merges
# over the built-in test_gap definition (lives in robotsix-mill:
# agent_definitions/periodic/test_gap.yaml).
#
# robotsix-yaml-config is a shared library consumed by robotsix-mill and
# robotsix-auto-mail through a stable public API: YamlConfigError,
# deep_merge, read_yaml_file, load_yaml_cascade, flatten_config,
# overlay_env_vars (exported from src/robotsix_yaml_config/__init__.py).
# Per-concern modules with the most untested surface: _env.py (env-var
# coercion), _core.py (cascade/merge), _flatten.py, _errors.py.
name: test_gap
