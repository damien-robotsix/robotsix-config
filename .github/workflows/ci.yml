name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-ci.yml@main
    with:
      python-version: "3.14"
      install-extras: "dev"
      cov-package: robotsix_yaml_config
      coverage-threshold: "90"
      run-deptry: true
      run-bandit: true

  # The reusable spine runs bandit as a gate but does not emit a SARIF file or
  # upload it, so the code-scanning integration is preserved as a dedicated job
  # that regenerates the SARIF report and uploads it.
  bandit-sarif:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Set up Python
        run: uv python install 3.14

      - name: bandit
        run: uvx --from 'bandit[sarif]' bandit -c pyproject.toml -r src/ -f sarif -o bandit-results.sarif

      - name: Upload bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  # The reusable spine runs pytest with coverage but only emits term-missing
  # output (no coverage.xml artifact), so the Codecov integration is preserved
  # as a dedicated job that regenerates the XML report and uploads it.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --extra dev

      - name: pytest
        run: uv run pytest --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
