modules:
  - id: robotsix_config
    paths:
      - src/robotsix_config/__init__.py
      - src/robotsix_config/py.typed
      - docs/robotsix_config/api.md
      - docs/robotsix_config/contributing.md
      - docs/robotsix_config/index.md
      - docs/robotsix_config/modules.yaml
      - docs/robotsix_config/security.md
  - id: config
    paths:
      - src/robotsix_config/config/__init__.py
      - docs/config/index.md
      - scripts/check_schema_freshness.py
      - tests/config/__init__.py
      - tests/config/test_config.py
      - tests/config/test_config.schema.json
  - id: _errors
    paths:
      - src/robotsix_config/_errors/__init__.py
      - docs/_errors/index.md
      - tests/_errors/__init__.py
      - tests/_errors/test_errors.py
  - id: scripts
    paths:
      - tests/scripts/__init__.py
      - tests/scripts/_test_models.py
      - tests/scripts/test_check_schema_freshness.py
  - id: tests
    paths:
      - tests/__init__.py
      - tests/conftest.py
