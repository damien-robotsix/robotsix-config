name: Deps Bump

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deps-bump:
    uses: damien-robotsix/robotsix-mill/.github/workflows/deps-bump.yml@d94a7108c45b387908add1c4f1a1747f20789c38
    permissions:
      contents: write
      pull-requests: write
    secrets:
      DEPS_BUMP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
